baseURL: https://ewigl.github.io/notes/
title: Licht's Notes
defaultContentLanguage: zh
theme: PaperMod
paginate: 8

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    # - RSS
    - JSON

params:
  author: Licht

  ShowReadingTime: true
  displayFullLangName: true
  # hideSummary: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowPageNums: true
  ShowToc: true

  disableSpecial1stPost: true

  hideFooter: true

  assets:
    favicon: ./favicon.ico

  label:
    text: Licht
    icon: ./images/logo.png
    iconHeight: 32

  homeInfoParams:
    Title: Licht's Notes
    Content: Welcome👋

  socialIcons:
    - name: Github
      url: https://github.com/ewigl

languages:
  zh:
    languageCode: zh
    languageName: 中文
    weight: 1
    taxonomies:
      tag: tags
    menu:
      main:
        - name: 搜索 🔍
          url: search/
          weight: 2
        - name: 归档 📚
          url: archives/
          weight: 5
        - name: 标签 🔖
          url: tags/
          weight: 6
        - name: 备份 📁
          url: backups/
          weight: 8
        - name: 关于 ♏
          url: about/
          weight: 9

  en:
    languageCode: en
    languageName: English
    weight: 2
    taxonomies:
      tag: tags
    menu:
      main:
        - name: Search 🔍
          url: search/
          weight: 2
        - name: Archives 📚
          url: archives/
          weight: 5
        - name: Tags 🔖
          url: tags/
          weight: 6
        - name: Backups 📁
          url: backups/
          weight: 8
        - name: About ♏
          url: about/
          weight: 9
